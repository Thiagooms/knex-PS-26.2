services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: techmart
      POSTGRES_PASSWORD: techmart
      POSTGRES_DB: techmart
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techmart"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://techmart:techmart@db:5432/techmart
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: 2h
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
